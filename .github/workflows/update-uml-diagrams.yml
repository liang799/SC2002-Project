name: Update UML Diagrams

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-uml-diagrams-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install PlantUML and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz plantuml

      - name: Generate UML diagrams and README links
        run: |
          set -euo pipefail

          UML_DIR="uml-diagrams"
          IMG_DIR="$UML_DIR/imgs"
          README="README.md"
          BEGIN_MARKER="<!-- BEGIN GENERATED UML CLASS DIAGRAMS -->"
          END_MARKER="<!-- END GENERATED UML CLASS DIAGRAMS -->"

          mkdir -p "$IMG_DIR"

          puml_count="$(find "$UML_DIR" -maxdepth 1 -type f -name '*.puml' | wc -l | tr -d ' ')"
          if [ "$puml_count" = "0" ]; then
            echo "No PlantUML files found in $UML_DIR." >&2
            exit 1
          fi

          find "$UML_DIR" -maxdepth 1 -type f -name '*.puml' | sort | while IFS= read -r puml_file; do
            plantuml -tpng -o imgs "$puml_file"
            plantuml -tsvg -o imgs "$puml_file"
          done

          block_file="$(mktemp)"
          readme_tmp="$(mktemp)"
          trap 'rm -f "$block_file" "$readme_tmp"' EXIT

          cat > "$block_file" <<'BLOCK'
          <!-- BEGIN GENERATED UML CLASS DIAGRAMS -->
          Rendered PlantUML outputs are also included:

          - [Class diagram PNG](uml-diagrams/imgs/plantuml_class_diagram.png)
          - [Class diagram SVG](uml-diagrams/imgs/plantuml_class_diagram.svg)

          ![SC2002 class diagram](uml-diagrams/imgs/plantuml_class_diagram.png)
          <!-- END GENERATED UML CLASS DIAGRAMS -->
          BLOCK

          if ! grep -q "$BEGIN_MARKER" "$README" || ! grep -q "$END_MARKER" "$README"; then
            echo "README.md must contain the generated UML class diagram markers." >&2
            exit 1
          fi

          awk -v begin="$BEGIN_MARKER" -v end="$END_MARKER" -v block_file="$block_file" '
            BEGIN {
              while ((getline line < block_file) > 0) {
                block = block line ORS
              }
              in_block = 0
            }
            index($0, begin) {
              printf "%s", block
              in_block = 1
              next
            }
            index($0, end) {
              in_block = 0
              next
            }
            !in_block {
              print
            }
          ' "$README" > "$readme_tmp"

          mv "$readme_tmp" "$README"

      - name: Commit generated UML updates
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain -- README.md "uml-diagrams/imgs")" ]; then
            echo "No generated UML updates to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md "uml-diagrams/imgs"
          git commit -m "docs: update generated UML diagrams"
          git push
