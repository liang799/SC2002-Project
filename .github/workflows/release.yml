name: Release On Tag

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install PlantUML and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz plantuml

      - name: Build and test
        run: mvn -B verify

      - name: Render PlantUML class diagram
        run: |
          plantuml -tpng "UML Class Diagram/plantuml_class_diagram.puml"
          plantuml -tsvg "UML Class Diagram/plantuml_class_diagram.puml"

      - name: Collect release assets
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          cli_jar="$(find target -maxdepth 1 -type f -name '*-cli.jar' | head -n 1)"
          gui_jar="$(find target -maxdepth 1 -type f -name '*-gui.jar' | head -n 1)"

          test -n "$cli_jar"
          test -n "$gui_jar"

          mkdir -p dist
          cp "$cli_jar" "dist/turnbased-arena-cli-${RELEASE_TAG}.jar"
          cp "$gui_jar" "dist/turnbased-arena-gui-${RELEASE_TAG}.jar"
          cp "UML Class Diagram/plantuml_class_diagram.png" "dist/plantuml_class_diagram.png"
          cp "UML Class Diagram/plantuml_class_diagram.svg" "dist/plantuml_class_diagram.svg"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* --title "$RELEASE_TAG" --generate-notes
          fi
