name: Release On Tag

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install PlantUML and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz plantuml

      - name: Build and test
        run: mvn -B verify

      - name: Render PlantUML diagrams
        run: |
          set -euo pipefail

          UML_DIR="uml-diagrams"
          export PLANTUML_LIMIT_SIZE=65536
          mkdir -p "$UML_DIR/imgs"

          find "$UML_DIR" -maxdepth 1 -type f -name '*.puml' | sort | while IFS= read -r puml_file; do
            plantuml -tpng -o imgs "$puml_file"
            plantuml -tsvg -o imgs "$puml_file"
          done

      - name: Collect release assets
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          SANITIZED_RELEASE_TAG="$(printf '%s' "$RELEASE_TAG" | sed 's/[^A-Za-z0-9._-]/-/g')"
          cli_jar="$(find target -maxdepth 1 -type f -name '*-cli.jar' | head -n 1)"
          gui_jar="$(find target -maxdepth 1 -type f -name '*-gui.jar' | head -n 1)"

          test -n "$cli_jar"
          test -n "$gui_jar"

          mkdir -p dist
          cp "$cli_jar" "dist/turnbased-arena-cli-${SANITIZED_RELEASE_TAG}.jar"
          cp "$gui_jar" "dist/turnbased-arena-gui-${SANITIZED_RELEASE_TAG}.jar"
          cp "uml-diagrams/imgs/plantuml_class_diagram.png" "dist/plantuml_class_diagram.png"
          cp "uml-diagrams/imgs/plantuml_class_diagram.svg" "dist/plantuml_class_diagram.svg"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* --title "$RELEASE_TAG" --generate-notes
          fi
