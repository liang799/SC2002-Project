883 L1025.09,2332.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1276.7804,2332.4883 L1276.7804,2342.4883 L1286.7804,2342.4883 L1276.7804,2332.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="74.3247" x="1031.09" y="2350.0566">Inheritance:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="240.6904" x="1031.09" y="2365.3672">PlayerCharacter and EnemyCombatant</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="139.5342" x="1031.09" y="2380.6777">specialize Combatant.</text></g><g class="entity" data-qualified-name="GMN239" data-source-line="1090" id="ent0240"><path d="M252.19,43.4883 L252.19,99.4199 L517.8414,99.4199 L517.8414,53.4883 L507.8414,43.4883 L252.19,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M507.8414,43.4883 L507.8414,53.4883 L517.8414,53.4883 L507.8414,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="84.4556" x="258.19" y="61.0566">Composition:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="238.1831" x="258.19" y="76.3672">Combatant owns HitPoints, Inventory,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="244.6514" x="258.19" y="91.6777">CombatStats, and StatusEffectRegistry.</text></g><g class="entity" data-qualified-name="GMN242" data-source-line="1096" id="ent0243"><path d="M3439.3,236.4883 L3439.3,292.4199 L3688.6506,292.4199 L3688.6506,246.4883 L3678.6506,236.4883 L3439.3,236.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M3678.6506,236.4883 L3678.6506,246.4883 L3688.6506,246.4883 L3678.6506,236.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="135.3701" x="3445.3" y="254.0566">Polymorphism / OCP:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="228.3506" x="3445.3" y="269.3672">actions share execute(); new actions</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="175.792" x="3445.3" y="284.6777">avoid BattleEngine changes.</text></g><g class="entity" data-qualified-name="GMN245" data-source-line="1102" id="ent0246"><path d="M2558.64,2331.4883 L2558.64,2387.4199 L2799.8846,2387.4199 L2799.8846,2341.4883 L2789.8846,2331.4883 L2558.64,2331.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2789.8846,2331.4883 L2789.8846,2341.4883 L2799.8846,2341.4883 L2789.8846,2331.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="135.3701" x="2564.64" y="2349.0566">Polymorphism / OCP:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="220.2446" x="2564.64" y="2364.3672">StatusEffectRegistry applies effects</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="175.0493" x="2564.64" y="2379.6777">through StatusEffect hooks.</text></g><g class="entity" data-qualified-name="GMN248" data-source-line="1108" id="ent0249"><path d="M4623.98,3821.4883 L4623.98,3877.4199 L4855.2207,3877.4199 L4855.2207,3831.4883 L4845.2207,3821.4883 L4623.98,3821.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M4845.2207,3821.4883 L4845.2207,3831.4883 L4855.2207,3831.4883 L4845.2207,3821.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="143.1968" x="4629.98" y="3839.0566">Dependency inversion:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="210.2407" x="4629.98" y="3854.3672">BattleEngine coordinates through</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="120.9546" x="4629.98" y="3869.6777">strategy interfaces.</text></g><g class="entity" data-qualified-name="GMN251" data-source-line="1114" id="ent0252"><path d="M4643.62,590.4883 L4643.62,646.4199 L4835.5751,646.4199 L4835.5751,600.4883 L4825.5751,590.4883 L4643.62,590.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M4825.5751,590.4883 L4825.5751,600.4883 L4835.5751,600.4883 L4825.5751,590.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="60.874" x="4649.62" y="608.0566">Observer:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="170.9551" x="4649.62" y="623.3672">records events and notifies</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="123.4937" x="4649.62" y="638.6777">BattleEventListener.</text></g><g class="entity" data-qualified-name="GMN254" data-source-line="1120" id="ent0255"><path d="M4620.71,7465.4883 L4620.71,7521.4199 L4858.4952,7521.4199 L4858.4952,7475.4883 L4848.4952,7465.4883 L4620.71,7465.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M4848.4952,7465.4883 L4848.4952,7475.4883 L4858.4952,7475.4883 L4848.4952,7465.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="49.8799" x="4626.71" y="7483.0566">Factory:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="216.7852" x="4626.71" y="7498.3672">setup and combatant construction</text><text fill="#000000" font-family="san