.3574" x="6581.46" y="3821.0866">Encapsulation: all combatant state is private</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="304.8843" x="6581.46" y="3836.3972">and changed through behavior methods such as</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="348.0293" x="6581.46" y="3851.7077">attack(), receiveDamage(), heal(), and addStatusEffect().</text></g><g class="entity" data-qualified-name="GMN271" data-source-line="916" id="ent0272"><path d="M6589.92,7093.1783 L6589.92,7133.7994 L6930.0484,7133.7994 L6930.0484,7103.1783 L6920.0484,7093.1783 L6589.92,7093.1783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M6920.0484,7093.1783 L6920.0484,7103.1783 L6930.0484,7103.1783 L6920.0484,7093.1783" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="319.1284" x="6595.92" y="7110.7466">Inheritance: PlayerCharacter and EnemyCombatant</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="285.3462" x="6595.92" y="7126.0572">specialize the shared Combatant abstraction.</text></g><g class="entity" data-qualified-name="GMN274" data-source-line="921" id="ent0275"><path d="M5508.31,282.5183 L5508.31,338.4499 L5905.8847,338.4499 L5905.8847,292.5183 L5895.8847,282.5183 L5508.31,282.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M5895.8847,282.5183 L5895.8847,292.5183 L5905.8847,292.5183 L5895.8847,282.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="309.0864" x="5514.31" y="300.0866">Composition: Combatant owns value objects and</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.7017" x="5514.31" y="315.3972">registries that make up its lifecycle state:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="376.5747" x="5514.31" y="330.7077">HitPoints, CombatStats, Inventory, and StatusEffectRegistry.</text></g><g class="entity" data-qualified-name="GMN277" data-source-line="927" id="ent0278"><path d="M7328.07,2593.5183 L7328.07,2649.4499 L7713.5778,2649.4499 L7713.5778,2603.5183 L7703.5778,2593.5183 L7328.07,2593.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M7703.5778,2593.5183 L7703.5778,2603.5183 L7713.5778,2603.5183 L7703.5778,2593.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.4771" x="7334.07" y="2611.0866">Polymorphism: player choices, enemy turns, items,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="331.1255" x="7334.07" y="2626.3972">and special skills are executed through BattleAction.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="364.5078" x="7334.07" y="2641.7077">New actions can be added without changing BattleEngine.</text></g><g class="entity" data-qualified-name="GMN280" data-source-line="933" id="ent0281"><path d="M8108.04,6143.1783 L8108.04,6183.7994 L8459.4863,6183.7994 L8459.4863,6153.1783 L8449.4863,6143.1783 L8108.04,6143.1783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M8449.4863,6143.1783 L8449.4863,6153.1783 L8459.4863,6153.1783 L8449.4863,6143.1783" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="330.4463" x="8114.04" y="6160.7466">Polymorphism: StatusEffectRegistry applies different</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="262.4883" x="8114.04" y="6176.0572">effects through the StatusEffect interface.</text></g><g class="entity" data-qualified-name="GMN283" data-source-line="938" id="ent0284"><path d="M4166.54,3748.5183 L4166.54,3804.4499 L4555.8691,3804.4499 L4555.8691,3758.5183 L4545.8691,3748.5183 L4166.54,3748.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M4545.8691,3748.5183 L4545.8691,3758.5183 L4555.8691,3758.5183 L4545.8691,3748.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="367.4468" x="4172.54" y="3766.0866">Dependency inversion: BattleEngine coordinates the battle</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="308.7817" x="4172.54" y="3781.3972">through abstractions such as TurnOrderStrategy,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="368.3291" x="4172.54" y="3796.7077">PlayerDecisionProvider, TurnProcessor, and WaveManager.</text></g><g class="entity" data-qualified-name="GMN286" data-source-line="944" id="ent0287"><path d="M158.51,3319.1783 L158.51,3359.7994 L591.53,3359.7994 L591.53,3329.1783 L581.53,3319.1783 L158.51,3319.1783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M581.53,3319.1783 L581.53,3329.1783 L591.53,3329.1783 L581.53,3319.1783" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="412.02" x="164.51" y="3336.7466">Boundary-Control split: GUI and CLI classes handle input/output,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="384.9219" x="164.51" y="3352.0572">while BattleController and BattleEngine coordinate use cases.</text></g><!--reverse link Combatant to PlayerCharacter--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="extension" data-source-line="741" id="lnk114">