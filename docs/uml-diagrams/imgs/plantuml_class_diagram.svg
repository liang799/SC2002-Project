 y="7396.1491">ResolvedPlayerCommand</text><line style="stroke:#333333;stroke-width:0.5;" x1="3082.82" x2="3264.4157" y1="7404.1022" y2="7404.1022"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="171.5957" x="3087.82" y="7421.6373">-decision: PlayerDecision</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="137.3477" x="3087.82" y="7438.1256">-actionName: String</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="133.2461" x="3087.82" y="7454.6139">-targetLabel: String</text><line style="stroke:#333333;stroke-width:0.5;" x1="3082.82" x2="3264.4157" y1="7461.567" y2="7461.567"/></g><!--class SwingThread--><g class="entity" data-qualified-name="UI LAYER - Swing GUI boundary.control.SwingThread" data-source-line="902" id="ent0142"><rect fill="#EAF0FF" height="73.1094" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="281.4043" x="2006.26" y="7104.8983"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="53.7773" x="2120.0735" y="7121.4998">&#171;control&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="87.4043" x="2103.26" y="7137.5663">SwingThread</text><line style="stroke:#333333;stroke-width:0.5;" x1="2007.26" x2="2286.6643" y1="7145.5194" y2="7145.5194"/><line style="stroke:#333333;stroke-width:0.5;" x1="2007.26" x2="2286.6643" y1="7153.5194" y2="7153.5194"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" text-decoration="underline" textLength="269.4043" x="2012.26" y="7171.0545">+runAndWait(runnable: Runnable): void</text></g><g class="entity" data-qualified-name="GMN360" data-source-line="1140" id="ent0361"><path d="M7557.47,5008.4883 L7557.47,5064.4199 L7926.4993,5064.4199 L7926.4993,5018.4883 L7916.4993,5008.4883 L7557.47,5008.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M7916.4993,5008.4883 L7916.4993,5018.4883 L7926.4993,5018.4883 L7916.4993,5008.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="278.3574" x="7563.47" y="5026.0566">Encapsulation: all combatant state is private</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="304.8843" x="7563.47" y="5041.3672">and changed through behavior methods such as</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="348.0293" x="7563.47" y="5056.6777">attack(), receiveDamage(), heal(), and addStatusEffect().</text></g><g class="entity" data-qualified-name="GMN363" data-source-line="1146" id="ent0364"><path d="M7571.92,9286.1483 L7571.92,9326.7694 L7912.0484,9326.7694 L7912.0484,9296.1483 L7902.0484,9286.1483 L7571.92,9286.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M7902.0484,9286.1483 L7902.0484,9296.1483 L7912.0484,9296.1483 L7902.0484,9286.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="319.1284" x="7577.92" y="9303.7166">Inheritance: PlayerCharacter and EnemyCombatant</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="285.3462" x="7577.92" y="9319.0272">specialize the shared Combatant abstraction.</text></g><g class="entity" data-qualified-name="GMN366" data-source-line="1151" id="ent0367"><path d="M6490.31,43.4883 L6490.31,99.4199 L6887.8847,99.4199 L6887.8847,53.4883 L6877.8847,43.4883 L6490.31,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M6877.8847,43.4883 L6877.8847,53.4883 L6887.8847,53.4883 L6877.8847,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="309.0864" x="6496.31" y="61.0566">Composition: Combatant owns value objects and</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.7017" x="6496.31" y="76.3672">registries that make up its lifecycle state:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="376.5747" x="6496.31" y="91.6777">HitPoints, CombatStats, Inventory, and StatusEffectRegistry.</text></g><g class="entity" data-qualified-name="GMN369" data-source-line="1157" id="ent0370"><path d="M8282.11,2635.4883 L8282.11,2691.4199 L8723.5343,2691.4199 L8723.5343,2645.4883 L8713.5343,2635.4883 L8282.11,2635.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M8713.5343,2635.4883 L8713.5343,2645.4883 L8723.5343,2645.4883 L8713.5343,2635.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="420.4243" x="8288.11" y="2653.0566">Polymorphism / Open-Closed: player choices, enemy turns, items,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="331.1255" x="8288.11" y="2668.3672">and special skills are executed through BattleAction.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="364.5078" x="8288.11" y="2683.6777">New actions can be added without changing BattleEngine.</text></g><g class="entity" data-qualified-name="GMN372" data-source-line="1163" id="ent0373"><path d="M9069.75,6114.4883 L9069.75,6170.4199 L9461.7959,6170.4199 L9461.7959,6124.4883 L9451.7959,6114.4883 L9069.75,6114.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M9451.7959,6114.4883 L9451.7959,6124.4883 L9461.7959,6124.4883 L9451.7959,6114.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="371.0459" x="9075.75" y="6132.0566">Polymorphism / Open-Closed: StatusEffectRegistry applies</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="320.8359" x="9075.75" y="6147.3672">different effects through the StatusEffect interface.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="314.0503" x="9075.75" y="6162.6777">New effects plug in by implementing StatusEffect.</text></g><g class="entity" data-qualified-name="GMN375" data-source-line="1169" id="ent0376"><path d="M5148.55,558.4883 L5148.55,614.4199 L5537.8791,614.4199 L5537.8791,568.4883 L5527.8791,558.4883 L5148.55,558.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M5527.8791,558.4883 L5527.8791,568.4883 L5537.8791,568.4883 L5527.8791,558.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="367.4468" x="5154.55" y="576.0566">Dependency inversion: BattleEngine coordinates the battle</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="308.7817" x="5154.55" y="591.3672">through abstractions such as TurnOrderStrategy,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="368.3291" x="5154.55" y="606.6777">PlayerDecisionProvider, TurnProcessor, and WaveManager.</text></g><g class="entity" data-qualified-name="GMN378" data-source-line="1175" id="ent0379"><path d="M5150.05,43.4883 L5150.05,99.4199 L5536.3703,99.4199 L5536.3703,53.4883 L5526.3703,43.4883 L5150.05,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M5526.3703,43.4883 L5526.3703,53.4883 L5536.3703,53.4883 L5526.3703,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="365.3203" x="5156.05" y="61.0566">Observer pattern: BattleEventPublisher records each event</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="330.8081" x="5156.05" y="76.3672">and notifies the BattleEventListener callback used by</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="202.1284" x="5156.05" y="91.6777">CLI and GUI presentation layers.</text></g><g class="entity" data-qualified-name="GMN381" data-source-line="1181" id="ent0382"><path d="M6495,3851.4883 L6495,3907.4199 L6883.1992,3907.4199 L6883.1992,3861.4883 L6873.1992,3851.4883 L6495,3851.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M6873.1992,3851.4883 L6873.1992,3861.4883 L6883.1992,3861.4883 L6873.1992,3851.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="367.1992" x="6501" y="3869.0566">Factory pattern: BattleSetupFactory and CombatantFactory</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="354.4468" x="6501" y="3884.3672">centralize object creation for preset and custom battles,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.4751" x="6501" y="3899.6777">keeping setup logic out of BattleEngine.</text></g><g class="entity" data-qualified-name="GMN384" data-source-line="1187" id="ent0385"><path d="M986.21,471.4883 L986.21,527.4199 L1381.5186,527.4199 L1381.5186,481.4883 L1371.5186,471.4883 L986.21,471.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1371.5186,471.4883 L1371.5186,481.4883 L1381.5186,481.4883 L1371.5186,471.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="363.6572" x="992.21" y="489.0566">Single Responsibility Principle: ArenaScenePanel owns the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="336.1846" x="992.21" y="504.3672">Swing boundary, ArenaSceneModel owns scene state,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="374.3086" x="992.21" y="519.6777">ArenaSceneRenderer draws it, and ArenaSceneLoop ticks it.</text></g><g class="entity" data-qualified-name="GMN387" data-source-line="1193" id="ent0388"><path d="M159.06,7013.1483 L159.06,7053.7694 L592.08,7053.7694 L592.08,7023.1483 L582.08,7013.1483 L159.06,7013.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M582.08,7013.1483 L582.08,7023.1483 L592.08,7023.1483 L582.08,7013.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="412.02" x="165.06" y="7030.7166">Boundary-Control split: GUI and CLI classes handle input/output,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="384.9219" x="165.06" y="7046.0272">while BattleController and BattleEngine coordinate use cases.</text></g><!--reverse link Combatant to PlayerCharacter--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="extension" data-source-line="908" id="lnk143"><path codeLine="908" d="M6976.35,4388.4683 C7192.81,4388.4683 7443,4388.4683 7443,4388.4683 C7443,4388.4683 7443,4208.0183 7443,4110.0283" fill="none" id="Combatant-backto-PlayerCharacter" style="stroke:#333333;stroke-width:1;"/><polygon fill="none" points="6958.35,4388.4683,6976.35,4394.4683,6976.35,4382.4683,6958.35,4388.4683" style="stroke:#333333;stroke-width:1;"/></g><!--reverse link Combatant to EnemyCombatant--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="extension" data-source-line="909" id="lnk144"><path codeLine="909" d="M6976.19,4398.3683 C7127.14,4398.3683 7297.53,4398.3683 7451.77,4398.3683" fill="none" id="Combatant-backto-EnemyCombatant" style="stroke:#333333;stroke-width:1;"/><polygon fill="none" points="6958.19,4398.3683,6976.19,4404.3683,6976.19,4392.3683,6958.19,4398.3683" style="stroke:#333333;stroke-width:1;"/></g><!--reverse link Combatant to CombatantId--><g class="link" data-entity-1="ent0003" data-entity-2="ent0009" data-link-type="composition" data-source-line="910" id="lnk145"><path codeLine="910" d="M6970.19,4677.8083 C7196.08,4677.8083 7493.81,4677.8083 7647.51,4677.8083" fill="none" id="Combatant-backto-CombatantId" style="stroke:#333333;stroke-width:1;"/><polygon fill="#333333" points="6958.19,4677.8083,6964.19,4681.8083,6970.19,4677.8083,6964.19,4673.8083,6958.19,4677.8083" style="stroke:#333333;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="11.9399" x="7290.85" y="4691.3766">id</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.2202" x="6966.351" y="4698.4816">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.2202" x="7631.6718" y="4689.1821">1</text></g><!--reverse link Combatant to HitPoints--><g class="link" data-entity-1="ent0003" data-entity-2="ent0012" data-link-type="composition" data-source-line="911" id="lnk146"><path codeLine="911" d="M6970.19,4528.4583 C7178.11,4528.4583 7445.05,4528.4583 7607.98,4528.4583" fill="none" id="Combatant-backto-HitPoints" style="stroke:#333333;stroke-width:1;"/><polygon fill="#333333" points="6958.19,4528.4583,6964.19,4532.4583,6970.19,4528.4583,6964.19,4524.4583,6958.19,4528.4583" style="stroke:#333333;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="16.25" x="7266.09" y="4542.0266">hp</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.2202" x="6966