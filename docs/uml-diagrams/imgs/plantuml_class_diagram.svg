 style="stroke:#333333;stroke-width:0.5;" x1="3082.82" x2="3264.4157" y1="3881.1022" y2="3881.1022"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="171.5957" x="3087.82" y="3898.6373">-decision: PlayerDecision</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="137.3477" x="3087.82" y="3915.1256">-actionName: String</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="133.2461" x="3087.82" y="3931.6139">-targetLabel: String</text><line style="stroke:#333333;stroke-width:0.5;" x1="3082.82" x2="3264.4157" y1="3938.567" y2="3938.567"/></g><!--class SwingThread--><g class="entity" data-qualified-name="UI LAYER - Swing GUI boundary.control.SwingThread" data-source-line="902" id="ent0142"><rect fill="#EAF0FF" height="73.1094" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="281.4043" x="2006.26" y="3913.8983"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="53.7773" x="2120.0735" y="3930.4998">&#171;control&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="87.4043" x="2103.26" y="3946.5663">SwingThread</text><line style="stroke:#333333;stroke-width:0.5;" x1="2007.26" x2="2286.6643" y1="3954.5194" y2="3954.5194"/><line style="stroke:#333333;stroke-width:0.5;" x1="2007.26" x2="2286.6643" y1="3962.5194" y2="3962.5194"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" text-decoration="underline" textLength="269.4043" x="2012.26" y="3980.0545">+runAndWait(runnable: Runnable): void</text></g><g class="entity" data-qualified-name="GMN360" data-source-line="1140" id="ent0361"><path d="M7557.47,3453.4883 L7557.47,3509.4199 L7926.4993,3509.4199 L7926.4993,3463.4883 L7916.4993,3453.4883 L7557.47,3453.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M7916.4993,3453.4883 L7916.4993,3463.4883 L7926.4993,3463.4883 L7916.4993,3453.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="278.3574" x="7563.47" y="3471.0566">Encapsulation: all combatant state is private</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="304.8843" x="7563.47" y="3486.3672">and changed through behavior methods such as</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="348.0293" x="7563.47" y="3501.6777">attack(), receiveDamage(), heal(), and addStatusEffect().</text></g><g class="entity" data-qualified-name="GMN363" data-source-line="1146" id="ent0364"><path d="M7571.92,7174.1483 L7571.92,7214.7694 L7912.0484,7214.7694 L7912.0484,7184.1483 L7902.0484,7174.1483 L7571.92,7174.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M7902.0484,7174.1483 L7902.0484,7184.1483 L7912.0484,7184.1483 L7902.0484,7174.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="319.1284" x="7577.92" y="7191.7166">Inheritance: PlayerCharacter and EnemyCombatant</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="285.3462" x="7577.92" y="7207.0272">specialize the shared Combatant abstraction.</text></g><g class="entity" data-qualified-name="GMN366" data-source-line="1151" id="ent0367"><path d="M6490.31,43.4883 L6490.31,99.4199 L6887.8847,99.4199 L6887.8847,53.4883 L6877.8847,43.4883 L6490.31,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M6877.8847,43.4883 L6877.8847,53.4883 L6887.8847,53.4883 L6877.8847,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="309.0864" x="6496.31" y="61.0566">Composition: Combatant owns value objects and</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.7017" x="6496.31" y="76.3672">registries that make up its lifecycle state:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="376.5747" x="6496.31" y="91.6777">HitPoints, CombatStats, Inventory, and StatusEffectRegistry.</text></g><g class="entity" data-qualified-name="GMN369" data-source-line="1157" id="ent0370"><path d="M8310.07,4666.4883 L8310.07,4722.4199 L8695.5778,4722.4199 L8695.5778,4676.4883 L8685.5778,4666.4883 L8310.07,4666.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M8685.5778,4666.4883 L8685.5778,4676.4883 L8695.5778,4676.4883 L8685.5778,4666.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.4771" x="8316.07" y="4684.0566">Polymorphism: player choices, enemy turns, items,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="331.1255" x="8316.07" y="4699.3672">and special skills are executed through BattleAction.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="364.5078" x="8316.07" y="4714.6777">New actions can be added without changing BattleEngine.</text></g><g class="entity" data-qualified-name="GMN372" data-source-line="1163" id="ent0373"><path d="M9090.05,5773.1483 L9090.05,5813.7694 L9441.4963,5813.7694 L9441.4963,5783.1483 L9431.4963,5773.1483 L9090.05,5773.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M9431.4963,5773.1483 L9431.4963,5783.1483 L9441.4963,5783.1483 L9431.4963,5773.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="330.4463" x="9096.05" y="5790.7166">Polymorphism: StatusEffectRegistry applies different</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="262.4883" x="9096.05" y="5806.0272">effects through the StatusEffect interface.</text></g><g class="entity" data-qualified-name="GMN375" data-source-line="1168" id="ent0376"><path d="M5148.55,2391.4883 L5148.55,2447.4199 L5537.8791,2447.4199 L5537.8791,2401.4883 L5527.8791,2391.4883 L5148.55,2391.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M5527.8791,2391.4883 L5527.8791,2401.4883 L5537.8791,2401.4883 L5527.8791,2391.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="367.4468" x="5154.55" y="2409.0566">Dependency inversion: BattleEngine coordinates the battle</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="308.7817" x="5154.55" y="2424.3672">through abstractions such as TurnOrderStrategy,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="368.3291" x="5154.55" y="2439.6777">PlayerDecisionProvider, TurnProcessor, and WaveManager.</text></g><g class="entity" data-qualified-name="GMN378" data-source-line="1174" id="ent0379"><path d="M159.06,3615.1483 L159.06,3655.7694 L592.08,3655.7694 L592.08,3625.1483 L582.08,3615.1483 L159.06,3615.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M582.08,3615.1483 L582.08,3625.1483 L592.08,3625.1483 L582.08,3615.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="412.02" x="165.06" y="3632.7166">Boundary-Control split: GUI and CLI classes handle input/output,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="384.9219" x="165.06" y="3648.0272">while BattleController and BattleEngine coordinate use cases.</text></g><!--reverse link Combatant to PlayerCharacter--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="extension" data-source-line="908" id="lnk143"><path codeLine="908" d="M6976.19,2888.4583 C7121.05,2888.4583 7282.38,2888.4583 7432.93,2888.4583" fill="none" id="Combatant-backto-PlayerCharacter" style="stroke:#333333;stroke-width:1;"/><polygon fill="none" points="6958.19,2888.4583,6976.19,2894.4583,6976.19,2882.4583,6958.19,2888.4583" style="stroke:#333333;stroke-width:1;"/></g><!--reverse link Combatant to EnemyCombatant--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="extension" data-source-line="909" id="lnk144"><path codeLine="909" d="M6976.19,3125.7683 C7127.14,3125.7683 7297.53,3125.7683 7451.77,3125.7683" fill="none" id="Combatant-backto-EnemyCombatant" style="stroke:#333333;stroke-width:1;"/><polygon fill="none" points="6958.19,3125.7683,6976.19,3131.7683,6976.19,3119.7683,6958.19,3125.7683" style="stroke:#333333;stroke-width:1;"/></g><!--reverse link Combatant to CombatantId--><g class="link" data-entity-1="ent0003" data-entity-2="ent0009" data-link-type="composition" data-source-line="910" id="lnk145"><path codeLine="910" d="M6970.19,3019.1683 C7196.08,3019.1683 7493.81,3019.1683 7647.51,3019.1683" fill="none" id="Combatant-backto-CombatantId" style="stroke:#333333;stroke-width:1;"/><polygon fill="#333333" points="6958.19,3019.1683,6964.19,3023.1683,6970.19,3019.1683,6964.19,3015.1683,6958.19,3019.1683" style="stroke:#333333;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="11.9399" x="7290.85" y="3032.7366">id</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.2202" x="6966.351" y="3036.3901">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.2202" x="7631.6718" 