rouped by layer:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="338.1055" x="8885.5308" y="6866.5117">UI Boundary -&gt; Engine Control -&gt; Domain Entity.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="381.3838" x="8885.5308" y="6883">Includes all production classes, key attributes/methods,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="363.0771" x="8885.5308" y="6899.4883">inheritance, ownership, and major architectural links.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4297" x="8885.5308" y="6915.9766">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="81.2109" x="8885.5308" y="6932.4648">Type labels:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="280.6563" x="8885.5308" y="6948.9531">&#171;interface&#187;, &#171;enumeration&#187;, and &#171;record&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="302.4561" x="8885.5308" y="6965.4414">identify non-standard class boxes explicitly.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="252.082" x="8885.5308" y="6981.9297">Plain rectangles are concrete classes.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4297" x="8885.5308" y="6998.418">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="94.9102" x="8885.5308" y="7014.9063">UML notation:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="112.6152" x="8885.5308" y="7031.3945">&lt;|-- inheritance</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="200.2998" x="8885.5308" y="7047.8828">&lt;|.. interface implementation</text><ellipse cx="8891.0308" cy="7059.8242" fill="#000000" rx="2.5" ry="2.5"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="239.6748" x="8897.5308" y="7064.3711">-- composition / strong ownership</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="260.6816" x="8885.5308" y="7080.8594">o-- aggregation / collection reference</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="256.5869" x="8885.5308" y="7097.3477">--&gt; association or major dependency</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4297" x="8885.5308" y="7113.8359">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="354.2725" x="8885.5308" y="7130.3242">To keep the generated image readable, local helper,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="397.1748" x="8885.5308" y="7146.8125">enum/value-object, and method-parameter-only uses are</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="344.1826" x="8885.5308" y="7163.3008">shown through signatures instead of extra arrows.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4297" x="8885.5308" y="7179.7891">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="174.5762" x="8885.5308" y="7196.2773">OO principle annotations:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="185.917" x="8885.5308" y="7212.7656">Encapsulation - Combatant</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="333.8877" x="8885.5308" y="7229.2539">Inheritance - PlayerCharacter / EnemyCombatant</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="359.9873" x="8885.5308" y="7245.7422">Composition - Combatant owns HitPoints, Inventory,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="259.041" x="8885.5308" y="7262.2305">CombatStats, and StatusEffectRegistry</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="353.5684" x="8885.5308" y="7278.7188">Polymorphism / OCP - BattleAction and StatusEffect</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="393.7363" x="8885.5308" y="7295.207">Dependency inversion - BattleEngine depends on strategy</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="351.2373" x="8885.5308" y="7311.6953">interfaces such as TurnProcessor and WaveManager</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="363.9863" x="8885.5308" y="7328.1836">Observer - BattleEventPublisher + BattleEventListener</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="349.8838" x="8885.5308" y="7344.6719">Factory - BattleSetupFactory and CombatantFactory</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="433.1592" x="8885.5308" y="7361.1602">SRP - ArenaScenePanel, ArenaSceneModel, ArenaSceneRenderer</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="362.5371" x="8885.5308" y="7377.6484">Boundary-Control - UI classes delegate battle flow to</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="224" x="8885.5308" y="7394.1367">BattleController and BattleEngine</text></g><?plantuml-s