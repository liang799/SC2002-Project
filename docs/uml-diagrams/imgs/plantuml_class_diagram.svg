"3715.1127">&#171;entity&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="170.3105" x="3099.5426" y="3731.1791">ResolvedPlayerCommand</text><line style="stroke:#333333;stroke-width:0.5;" x1="3093.9" x2="3275.4957" y1="3739.1322" y2="3739.1322"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="171.5957" x="3098.9" y="3756.6673">-decision: PlayerDecision</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="137.3477" x="3098.9" y="3773.1556">-actionName: String</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="133.2461" x="3098.9" y="3789.6439">-targetLabel: String</text><line style="stroke:#333333;stroke-width:0.5;" x1="3093.9" x2="3275.4957" y1="3796.597" y2="3796.597"/></g><g class="entity" data-qualified-name="GMN266" data-source-line="906" id="ent0267"><path d="M6157.12,4850.5183 L6157.12,4906.4499 L6526.1493,4906.4499 L6526.1493,4860.5183 L6516.1493,4850.5183 L6157.12,4850.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M6516.1493,4850.5183 L6516.1493,4860.5183 L6526.1493,4860.5183 L6516.1493,4850.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="278.3574" x="6163.12" y="4868.0866">Encapsulation: all combatant state is private</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="304.8843" x="6163.12" y="4883.3972">and changed through behavior methods such as</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="348.0293" x="6163.12" y="4898.7077">attack(), receiveDamage(), heal(), and addStatusEffect().</text></g><g class="entity" data-qualified-name="GMN269" data-source-line="912" id="ent0270"><path d="M6171.57,7120.1783 L6171.57,7160.7994 L6511.6984,7160.7994 L6511.6984,7130.1783 L6501.6984,7120.1783 L6171.57,7120.1783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M6501.6984,7120.1783 L6501.6984,7130.1783 L6511.6984,7130.1783 L6501.6984,7120.1783" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="319.1284" x="6177.57" y="7137.7466">Inheritance: PlayerCharacter and EnemyCombatant</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="285.3462" x="6177.57" y="7153.0572">specialize the shared Combatant abstraction.</text></g><g class="entity" data-qualified-name="GMN272" data-source-line="917" id="ent0273"><path d="M5194.32,282.5183 L5194.32,338.4499 L5591.8947,338.4499 L5591.8947,292.5183 L5581.8947,282.5183 L5194.32,282.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M5581.8947,282.5183 L5581.8947,292.5183 L5591.8947,292.5183 L5581.8947,282.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="309.0864" x="5200.32" y="300.0866">Composition: Combatant owns value objects and</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.7017" x="5200.32" y="315.3972">registries that make up its lifecycle state:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="376.5747" x="5200.32" y="330.7077">HitPoints, CombatStats, Inventory, and StatusEffectRegistry.</text></g><g class="entity" data-qualified-name="GMN275" data-source-line="923" id="ent0276"><path d="M6909.72,2593.5183 L6909.72,2649.4499 L7295.2278,2649.4499 L7295.2278,2603.5183 L7285.2278,2593.5183 L6909.72,2593.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M7285.2278,2593.5183 L7285.2278,2603.5183 L7295.2278,2603.5183 L7285.2278,2593.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.4771" x="6915.72" y="2611.0866">Polymorphism: player choices, enemy turns, items,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="331.1255" x="6915.72" y="2626.3972">and special skills are executed through BattleAction.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="364.5078" x="6915.72" y="2641.7077">New actions can be added without changing BattleEngine.</text></g><g class="entity" data-qualified-name="GMN278" data-source-line="929" id="ent0279"><path d="M7689.7,6170.1783 L7689.7,6210.7994 L8041.1463,6210.7994 L8041.1463,6180.1783 L8031.1463,6170.1783 L7689.7,6170.1783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M8031.1463,6170.1783 L8031.1463,6180.1783 L8041.1463,6180.1783 L8031.1463,6170.1783" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="330.4463" x="7695.7" y="6187.7466">Polymorphism: StatusEffectRegistry applies different</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="262.4883" x="7695.7" y="6203.0572">effects through the StatusEffect interface.</text></g><g class="entity" data-qualified-name="GMN281" data-source-line="934" id="ent0282"><path d="M4061.29,2957.5183 L4061.29,3013.4499 L4450.6191,3013.4499 L4450.6191,2967.5183 L4440.6191,2957.5183 L4061.29,2957.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M4440.6191,2957.5183 L4440.6191,2967.5183 L4450.6191,2967.5183 L4440.6191,2957.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="367.4468" x="4067.29" y="2975.0866">Dependency inversion: BattleEngine coordinates the battle</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="308.7817" x="4067.29" y="2990.3972">through abstractions such as TurnOrderStrategy,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="368.3291" x="4067.29" y="3005.7077">PlayerDecisionProvider, TurnProcessor, and WaveManager.</text></g><g class="entity" data-qualified-name="GMN284" data-source-line="940" id="ent0285"><path d="M157.62,3328.1783 L157.62,3368.7994 L590.64,3368.7994 L590.64,3338.1783 L580.64,3328.1783 L157.62,3328.1783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M580.64,3328.1783 L580.64,3338.1783 L590.64,3338.1783 L580.64,3328.1783" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="412.02" x="163.62" y="3345.7466">Boundary-Control split: GUI and CLI classes handle input/output,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="384.9219" x="163.62" y="3361.0572">while BattleController and BattleEngine coordinate use cases.</text></g><!--reverse link Combatant to PlayerCharacter--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="extension" data-source-line="739" id="lnk114"><path codeLine="739" d="M5659.92,3993.1683 C5843.19,3993.1683 6042.65,3993.1683 6042.65,3993.1683 C6042.65,3993.1683 6042.65,3982.5783 6042.65,3968.8483" fill="none" id="Combatant-backto-PlayerCharacter" style="stroke:#333333;stroke-width:1;"/><polygon fill="none" points="5641.92,3993.1683,5659.92,3999.1683,5659.92,3987.1683,5641.92,3993.1683" style="stroke:#333333;stroke-width:1;"/></g><!--reverse link Combatant to EnemyCombatant--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="extension" data-source-line="740" id="lnk115"><path codeLine="740" d="M5660.01,41