-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="164.2539" x="201.89" y="3412.8856">-player: PlayerCharacter</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="230.8291" x="201.89" y="3429.3739">-livingEnemies: List&lt;Combatant&gt;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="344.4766" x="201.89" y="3445.8622">-responseQueue: BlockingQueue&lt;PlayerDecision&gt;</text><line style="stroke:#333333;stroke-width:0.5;" x1="196.89" x2="551.3666" y1="3452.8153" y2="3452.8153"/></g><!--class ResolvedPlayerCommand--><g class="entity" data-qualified-name="UI LAYER - Swing GUI boundary.control.ResolvedPlayerCommand" data-source-line="952" id="ent0141"><rect fill="#E8F4EA" height="120.2188" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="183.5957" x="282.33" y="2903.3483"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="50.1504" x="349.0527" y="2919.9498">&#171;record&#187;</text><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="45.4219" x="351.4169" y="2934.0827">&#171;entity&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="170.3105" x="288.9726" y="2950.1491">ResolvedPlayerCommand</text><line style="stroke:#333333;stroke-width:0.5;" x1="283.33" x2="464.9257" y1="2958.1022" y2="2958.1022"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="171.5957" x="288.33" y="2975.6373">-decision: PlayerDecision</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="137.3477" x="288.33" y="2992.1256">-actionName: String</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="133.2461" x="288.33" y="3008.6139">-targetLabel: String</text><line style="stroke:#333333;stroke-width:0.5;" x1="283.33" x2="464.9257" y1="3015.567" y2="3015.567"/></g><!--class SwingThread--><g class="entity" data-qualified-name="UI LAYER - Swing GUI boundary.control.SwingThread" data-source-line="958" id="ent0142"><rect fill="#EAF0FF" height="73.1094" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="281.4043" x="1042.73" y="3536.9083"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="53.7773" x="1156.5435" y="3553.5098">&#171;control&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="87.4043" x="1139.73" y="3569.5762">SwingThread</text><line style="stroke:#333333;stroke-width:0.5;" x1="1043.73" x2="1323.1343" y1="3577.5294" y2="3577.5294"/><line style="stroke:#333333;stroke-width:0.5;" x1="1043.73" x2="1323.1343" y1="3585.5294" y2="3585.5294"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" text-decoration="underline" textLength="269.4043" x="1048.73" y="3603.0645">+runAndWait(runnable: Runnable): void</text></g><g class="entity" data-qualified-name="GMN285" data-source-line="1121" id="ent0286"><path d="M6986.57,8587.4883 L6986.57,8643.4199 L7355.5993,8643.4199 L7355.5993,8597.4883 L7345.5993,8587.4883 L6986.57,8587.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M7345.5993,8587.4883 L7345.5993,8597.4883 L7355.5993,8597.4883 L7345.5993,8587.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="278.3574" x="6992.57" y="8605.0566">Encapsulation: all combatant state is private</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="304.8843" x="6992.57" y="8620.3672">and changed through behavior methods such as</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="348.0293" x="6992.57" y="8635.6777">attack(), receiveDamage(), heal(), and addStatusEffect().</text></g><g class="entity" data-qualified-name="GMN288" data-source-line="1127" id="ent0289"><path d="M7001.03,8512.1483 L7001.03,8552.7694 L7341.1584,8552.7694 L7341.1584,8522.1483 L7331.1584,8512.1483 L7001.03,8512.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M7331.1584,8512.1483 L7331.1584,8522.1483 L7341.1584,8522.1483 L7331.1584,8512.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="319.1284" x="7007.03" y="8529.7166">Inheritance: PlayerCharacter and EnemyCombatant</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="285.3462" x="7007.03" y="8545.0272">specialize the shared Combatant abstraction.</text></g><g class="entity" data-qualified-name="GMN291" data-source-line="1132" id="ent0292"><path d="M5801.42,43.4883 L5801.42,99.4199 L6198.9947,99.4199 L6198.9947,53.4883 L6188.9947,43.4883 L5801.42,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M6188.9947,43.4883 L6188.9947,53.4883 L6198.9947,53.4883 L6188.9947,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="309.0864" x="5807.42" y="61.0566">Composition: Combatant owns value objects and</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.7017" x="5807.42" y="76.3672">registries that make up its lifecycle state:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="376.5747" x="5807.42" y="91.6777">HitPoints, CombatStats, Inventory, and StatusEffectRegistry.</text></g><g class="entity" data-qualified-name="GMN294" data-source-line="1138" id="ent0295"><path d="M7795.22,2950.4883 L7795.22,3006.4199 L8236.6443,3006.4199 L8236.6443,2960.4883 L8226.6443,2950.4883 L7795.22,2950.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M8226.6443,2950.4883 L8226.6443,2960.4883 L8236.6443,2960.4883 L8226.6443,2950.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="420.4243" x="7801.22" y="2968.0566">Polymorphism / Open-Closed: player choices, enemy turns, items,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="331.1255" x="7801.22" y="2983.3672">and special skills are executed through BattleAction.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="364.5078" x="7801.22" y="2998.6777">New actions can be added without changing BattleEngine.</text></g><g class="entity" data-qualified-name="GMN297" data-source-line="1144" id="ent0298"><path d="M8583.85,8515.4883 L8583.85,8571.4199 L8975.8959,8571.4199 L8975.8959,8525.4883 L8965.8959,8515.4883 L8583.85,8515.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M8965.8959,8515.4883 L8965.8959,8525.4883 L8975.8959,8525.4883 L8965.8959,8515.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="371.0459" x="8589.85" y="8533.0566">Polymorphism / Open-Closed: StatusEffectRegistry applies</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="320.8359" x="8589.85" y="8548.3672">different effects through the StatusEffect interface.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="314.0503" x="8589.85" y="8563.6777">New effects plug in by implementing StatusEffect.</text></g><g class="entity" data-qualified-name="GMN300" data-source-line="1150" id="ent0301"><path d="M4350.65,3916.4883 L4350.65,3972.4199 L4739.9791,3972.4199 L4739.9791,3926.4883 L4729.9791,3916.4883 L4350.65,3916.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M4729.9791,3916.4883 L4729.9791,3926.4883 L4739.9791,3926.4883 L4729.9791,3916.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="367.4468" x="4356.65" y="3934.0566">Dependency inversion: BattleEngine coordinates the battle</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="308.7817" x="4356.65" y="3949.3672">through abstractions such as TurnOrderStrategy,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="368.3291" x="4356.65" y="3964.6777">PlayerDecisionProvider, TurnProcessor, and WaveManager.</text></g><g class="entity" data-qualified-name="GMN303" data-source-line="1156" id="ent0304"><path d="M4352.16,43.4883 L4352.16,99.4199 L4738.4803,99.4199 L4738.4803,53.4883 L4728.4803,43.4883 L4352.16,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M4728.4803,43.4883 L4728.4803,53.4883 L4738.4803,53.4883 L4728.4803,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="365.3203" x="4358.16" y="61.0566">Observer pattern: BattleEventPublisher records each event</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="330.8081" x="4358.16" y="76.3672">and notifies the BattleEventListener callback used by</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="202.1284" x="4358.16" y="91.6777">CLI and GUI presentation layers.</text></g><g class="entity" data-qualified-name="GMN306" data-source-line="1162" id="ent0307"><path d="M4351.22,3683.4883 L4351.22,3739.4199 L4739.4192,3739.4199 L4739.4192,3693.4883 L4729.4192,3683.4883 L4351.22,3683.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M4729.4192,3683.4883 L4729.4192,3693.4883 L4739.4192,3693.4883 L4729.4192,3683.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="367.1992" x="4357.22" y="3701.0566">Factory pattern: BattleSetupFactory and CombatantFactory</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="354.4468" x="4357.22" y="3716.3672">centralize object creation for preset and custom battles,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.4751" x="4357.22" y="3731.6777">keeping setup logic out of BattleEngine.</text></g><g class="entity" data-qualified-name="GMN309" data-source-line="1168" id="ent0310"><path d="M985.77,1417.4883 L985.77,1473.4199 L1381.0786,1473.4199 L1381.0786,1427.4883 L1371.0786,1417.4883 L985.77,1417.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1371.0786,1417.4883 L1371.0786,1427.4883 L1381.0786,1427.4883 L1371.0786,1417.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="363.6572" x="991.77" y="1435.0566">Single Responsibility Principle: ArenaScenePanel owns the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="336.1846" x="991.77" y="1450.3672">Swing boundary, ArenaSceneModel owns scene state,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="374.3086" x="991.77" y="1465.6777">ArenaSceneRenderer draws it, and ArenaSceneLoop ticks it.</text></g><g class="entity" data-qualified-name="GMN312" data-source-line="1174" id="ent0313"><path d="M157.62,1433.1483 L157.62,1473.7694 L590.