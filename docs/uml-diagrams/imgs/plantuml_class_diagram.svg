26.71" y="7466.0566">Factory:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="216.7852" x="4626.71" y="7481.3672">setup and combatant construction</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="97.6904" x="4626.71" y="7496.6777">are centralized.</text></g><g class="entity" data-qualified-name="GMN255" data-source-line="1116" id="ent0256"><path d="M5945.97,590.4883 L5945.97,646.4199 L6225.0086,646.4199 L6225.0086,600.4883 L6215.0086,590.4883 L5945.97,590.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M6215.0086,590.4883 L6215.0086,600.4883 L6225.0086,600.4883 L6215.0086,590.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="26.5205" x="5951.97" y="608.0566">SRP:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="258.0386" x="5951.97" y="623.3672">panel handles Swing, model stores state,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="169.2412" x="5951.97" y="638.6777">renderer draws, loop ticks.</text></g><g class="entity" data-qualified-name="GMN258" data-source-line="1122" id="ent0259"><path d="M4623.04,499.4883 L4623.04,555.4199 L4856.1533,555.4199 L4856.1533,509.4883 L4846.1533,499.4883 L4623.04,499.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M4846.1533,499.4883 L4846.1533,509.4883 L4856.1533,509.4883 L4846.1533,499.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="117.6792" x="4629.04" y="517.0566">Boundary-Control:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="165.1216" x="4629.04" y="532.3672">UI delegates battle flow to</text><text f