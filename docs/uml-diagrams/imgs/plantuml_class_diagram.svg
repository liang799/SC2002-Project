l="none" id="BattleEventPublisher-GMN251" style="stroke:#333333;stroke-width:1;stroke-dasharray:7,7;"/></g><!--link BattleSetupFactory to GMN254--><g class="link" data-entity-1="ent0061" data-entity-2="ent0255" data-link-type="association" data-source-line="1120" id="lnk256"><path d="M3788,1444.4983 C3915.37,1444.4983 4049.69,1444.4983 4049.69,1444.4983 C4049.69,1444.4983 4049.69,7493.4483 4049.69,7493.4483 C4049.69,7493.4483 4422.75,7493.4483 4620.21,7493.4483" fill="none" id="BattleSetupFactory-GMN254" style="stroke:#333333;stroke-width:1;stroke-dasharray:7,7;"/></g><!--link ArenaScenePanel to GMN257--><g class="link" data-entity-1="ent0110" data-entity-2="ent0258" data-link-type="association" data-source-line="1126" id="lnk259"><path d="M6406.32,6220.6683 C6579.71,6220.6683 6758.69,6220.6683 6758.69,6220.6683 C6758.69,6220.6683 6758.69,618.4483 6758.69,618.4483 C6758.69,618.4483 6422.63,618.4483 6225.38,618.4483" fill="none" id="ArenaScenePanel-GMN257" style="stroke:#333333;stroke-width:1;stroke-dasharray:7,7;"/></g><!--link TurnBasedArenaGui to GMN260--><g class="link" data-entity-1="ent0107" data-entity-2="ent0261" data-link-type="association" data-source-line="1132" id="lnk262"><path d="M4877.63,6617.7383 C5076.94,6617.7383 5421.69,6617.7383 5421.69,6617.7383 C5421.69,6617.7383 5421.69,527.4483 5421.69,527.4483 C5421.69,527.4483 5051.38,527.4483 4856.47,527.4483" fill="none" id="TurnBasedArenaGui-GMN260" style="stroke:#333333;stroke-width:1;stroke-dasharray:7,7;"/></g><g class="legend" data-source-line="20"><rect fill="#DDDDDD" height="587.0898" rx="7.5" ry="7.5" style="stroke:#000000;stroke-width:1;" width="447.5889" x="8876.1011" y="7539.4199"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="320.332" x="8881.1011" y="7557.9551">Focus: classes and interfaces grouped by layer:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="338.1055" x="8881.1011" y="7574.4434">UI Boundary -&gt; Engine Control -&gt; Domain Entity.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="381.3838" x="8881.1011" y="7590.9316">Includes all production classes, key attributes/methods,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="363.0771" x="8881.1011" y="7607.4199">inheritance, ownership, and major architectural links.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4297" x="8881.1011" y="7623.9082">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="81.2109" x="8881.1011" y="7640.3965">Type labels:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="280.6563" x="8881.1011" y="7656.8848">&#171;interface&#187;, &#171;enumeration&#187;, and &#171;record&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="302.4561" x="8881.1011" y="7673.373">identify non-standard class boxes explicitly.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="252.082" x="8881.1011" y="7689.8613">Plain rectangles are concrete classes.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4297" x="8881.1011" y="7706.3496">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="94.9102" x="8881.1011" y="7722.8379">UML notation:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="112.6152" x="8881.1011" y="7739.3262">&lt;|-- inheritance</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="200.2998" x="8881.1011" y="7755.8145">&lt;|.. interface implementation</text><ellipse cx="8886.6011" cy="7767.7559" fill="#000000" rx="2.5" ry="2.5"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="239.6748" x="8893.1011" y="7772.3027">-- composition / strong ownership</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="260.6816" x="8881.1011" y="7788.791">o-- aggregation / collection reference</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="256.5869" x="8881.1011" y="7805.2793">--&gt; association or major dependency</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4297" x="8881.1011" y="7821.7676">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="354.2725" x="8881.1011" y="7838.2559">To keep the generated image readable, local helper,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="397.1748" x="8881.1011" y="7854.7441">enum/value-object, and method-parameter-only uses are</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="344.1826" x="8881.1011" y="7871.2324">shown through signatures instead of extra arrows.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4297" x="8881.1011" y="7887.7207">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="174.5762" x="8881.1011" y="7904.209">OO principle annotations:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="185.917" x="8881.1011" y="7920.6973">Encapsulation - Combatant</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="333.8877" x="8881.1011" y="7937.1855">Inheritance - PlayerCharacter / EnemyCombatant</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="359.9873" x="8881.1011" y="7953.6738">Composition - Combatant owns HitPoints, Inventory,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="259.041" x="8881.1011" y="7970.1621">CombatStats, and StatusEffectRegistry</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="353.5684" x="8881.1011" y="7986.6504">Polymorphism / OCP - BattleAction and StatusEffect</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="393.7363" x="8881.1011" y="8003.1387">Dependency inversion - BattleEngine depends on strategy</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="351.2373" x="8881.1011" y="8019.627">interfaces such as TurnProcessor and WaveManager</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="363.9863" x="8881.1011" y="8036.1152">Observer - BattleEventPublisher + BattleEventListener</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="349.8838" x="8881.1011" y="8052.6035">Factory - BattleSetupFactory and CombatantFactory</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="437.5889" x="8881.1011" y="8069.0918">SRP - ArenaScenePanel, ArenaSceneModel, ArenaSceneRenderer,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="181.2002" x="8881.1011" y="8085.5801">ArenaBackgroundRenderer</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="362.5371" x="8881.1011" y="8102.0684">Boundary-Control - UI classes delegate battle flow to</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="224" x="8881.1011" y="8118.5566">BattleController and BattleEngine</text></g