x="1057.03" y="1428.6777">behavior methods.</text></g><g class="entity" data-qualified-name="GMN234" data-source-line="1074" id="ent0235"><path d="M1025.09,2332.4883 L1025.09,2388.4199 L1286.7804,2388.4199 L1286.7804,2342.4883 L1276.7804,2332.4883 L1025.09,2332.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1276.7804,2332.4883 L1276.7804,2342.4883 L1286.7804,2342.4883 L1276.7804,2332.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="74.3247" x="1031.09" y="2350.0566">Inheritance:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="240.6904" x="1031.09" y="2365.3672">PlayerCharacter and EnemyCombatant</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="139.5342" x="1031.09" y="2380.6777">specialize Combatant.</text></g><g class="entity" data-qualified-name="GMN237" data-source-line="1080" id="ent0238"><path d="M252.19,43.4883 L252.19,99.4199 L517.8414,99.4199 L517.8414,53.4883 L507.8414,43.4883 L252.19,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M507.8414,43.4883 L507.8414,53.4883 L517.8414,53.4883 L507.8414,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="84.4556" x="258.19" y="61.0566">Composition:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="238.1831" x="258.19" y="76.3672">Combatant owns HitPoints, Inventory,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="244.6514" x="258.19" y="91.6777">CombatStats, and StatusEffectRegistry.</text></g><g class="entity" data-qualified-name="GMN240" data-source-line="1086" id="ent0241"><path d="M3439.3,236.4883 L3439.3,292.4199 L3688.6506,292.4199 L3688