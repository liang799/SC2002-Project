l="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.2202" x="7526.5925" y="4778.6403">1</text></g><!--reverse link Combatant to StatusEffectRegistry--><g class="link" data-entity-1="ent0003" data-entity-2="ent0018" data-link-type="composition" data-source-line="914" id="lnk149"><path codeLine="914" d="M6970.4,4707.0183 C7176.26,4707.0183 7413,4707.0183 7413,4707.0183 C7413,4707.0183 7413,5058.1783 7413,5231.7083" fill="none" id="Combatant-backto-StatusEffectRegistry" style="stroke:#333333;stroke-width:1;"/><polygon fill="#333333" points="6958.4,4707.0183,6964.4,4711.0183,6970.4,4707.0183,6964.4,4703.0183,6958.4,4707.0183" style="stroke:#333333;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="84.5317" x="7328" y="4755.6266">status effects</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.2202" x="6965.7444" y="4728.9646">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.2202" x="7376.3942" y="5236.7916">1</text></g><!--reverse link PlayerCharacter to SpecialSkill--><g class="link" data-entity-1="ent0004" data-entity-2="ent0007" data-link-type="composition" data-source-line="915" id="lnk150"><path codeLine="915" d="M8062.9,4060.8183 C8101.39,4060.8183 8128.89,4060.8183 8167.76,4060.8183" fill="none" id="PlayerCharacter-backto-SpecialSkill" style="stroke:#333333;stroke-width:1;"/><polygon fill="#333333" points="8050.9,4060.8183,8056.9,4064.8183,8062.9,4060.8183,8056.9,4056.8183,8050.9,4060.8183" style="stroke:#333333;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="69.2783" x="8039.33" y="4074.3866">specialSkill</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.2202" x="8058.6281" y="4074.4188">1</text><text fill="#000000" font-family="sans-ser