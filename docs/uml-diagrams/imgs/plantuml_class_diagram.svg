ns-serif" font-size="14" lengthAdjust="spacing" textLength="349.8428" x="8718.9887" y="8960.2559">To keep the generated image readable, local helper</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="403.3613" x="8718.9887" y="8976.7441">dependencies and method-parameter-only uses are shown</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="295.8525" x="8718.9887" y="8993.2324">through signatures instead of extra arrows.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4297" x="8718.9887" y="9009.7207">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="260.709" x="8718.9887" y="9026.209">OO annotations are attached as notes.</text></g><?plantuml-src tJtzR-Csih_xhn3sVdZEhPFTQmyF3yOYW6CxML_puREJs_OLnKAs65iNMTBJHxA-NlTlVpCa9V5ZA3dPRT7U5RYDoI4vCnmEXyFXg0YBY7dByJTlttxZtPPPV7pcvopmnibkvHVUA6Enxnrxb_wUPLWS-NdkJK9_a_cxNYzYzuLN95uMRhQ55uGPMnTX4lVoXp1EVG3nrjXWL1HPk2eBDbidyJBy5_FUAY2fltxmDsnPx04JxC6FDn5J0A8mPiK-PLwQH7lyqTk60VFMORO6E7Cmx-UUvvr1dviiAUDWd4H9zkuTYukms9-UUd-Q_i_vNwSZ2WQGAx8aua2ZyxVdvnJG2l_sCzxL-VdvNoV_JK7bHUONR2EWleKXoRxk_NMHoAxUudyave-0EmUPJCVJCO8aMS0oNktzwLl-FoWTPLdof1V-WZEqON4W9WY0pfDrcGy5erZk-L0LnWNB01FuYUEcCCkhlHVXX0-XnTqCnXCaUyUdtZJUm0I0U71MOSaasVbX31N8u1DeCOlNKHb0Ts6yPLa8qxbc0my6JDQXZ-AH3xm7jlVyIYhoDpjMR9CW7q1h5fSxbd4u3oSTW17BcnilpS9u7QOW9742ZKvw07sBOX7vAnRbYEoxTpKrfwS33wUzxWqBiATtxq36W8Edfz00v0Zmljz3b_5n3gW2dO6KerNo2OXWdz8eNCCguRJD8wIr5bBWO0Q2cCJhZ1MiOYl7xExg4l7aGtFK_dryh7A45vsSDEptmXtGjWDyU1ke_pEqM2UxDCb3peut7eXL4c-yv2bcMRuDKm1A0CZVR3AsyINGEeaYiGu1qNjOjcAqOvWhPH8ya9ET_q_u_u2b8280jUSSJM1oMEeLM-Q1w23pG2B27QnGwCuF_5K4inabQp_ojYnAMGQDwYv2ALHYGe_viWJEPCT97EszCfSSoxT00hGhjY1ncwsNXvlOBygC2qrUm31USW-iXrK4y23NWgSW17vSCLNq14BahxU0ePzNOW6O2AdlzQHgyLvDRgv6isllSlJ3T07gB10oovK2eFoAwmn_XQjsNSZf5nhGZmkGcAeAbg6YIh0Hy1NdI43EWc7JR1R8wXXOCFIM8EpnHXQjGCSkWOoyWkS_P6K