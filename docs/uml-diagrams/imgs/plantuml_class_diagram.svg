="spacing" textLength="137.3477" x="2911.93" y="3605.1556">-actionName: String</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="133.2461" x="2911.93" y="3621.6439">-targetLabel: String</text><line style="stroke:#333333;stroke-width:0.5;" x1="2906.93" x2="3088.5257" y1="3628.597" y2="3628.597"/></g><g class="entity" data-qualified-name="GMN266" data-source-line="900" id="ent0267"><path d="M5783.18,4682.5183 L5783.18,4738.4499 L6152.2093,4738.4499 L6152.2093,4692.5183 L6142.2093,4682.5183 L5783.18,4682.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M6142.2093,4682.5183 L6142.2093,4692.5183 L6152.2093,4692.5183 L6142.2093,4682.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="278.3574" x="5789.18" y="4700.0866">Encapsulation: all combatant state is private</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="304.8843" x="5789.18" y="4715.3972">and changed through behavior methods such as</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="348.0293" x="5789.18" y="4730.7077">attack(), receiveDamage(), heal(), and addStatusEffect().</text></g><g class="entity" data-qualified-name="GMN269" data-source-line="906" id="ent0270"><path d="M5797.63,6952.1783 L5797.63,6992.7994 L6137.7584,6992.7994 L6137.7584,6962.1783 L6127.7584,6952.1783 L5797.63,6952.1783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M6127.7584,6952.1783 L6127.7584,6962.1783 L6137.7584,6962.1783 L6127.7584,6952.1783" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="319.1284" x="5803.63" y="6969.7466">Inheritance: PlayerCharacter and EnemyCombatant</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="285.3462" x="5803.63" y="6985.0572">specialize the shared Combatant abstraction.</text></g><g class="entity" data-qualified-name="GMN272" data-source-line="911" id="ent0273"><path d="M4820.38,282.5183 L4820.38,338.4499 L5217.9547,338.4499 L5217.9547,292.5183 L5207.9547,282.5183 L4820.38,282.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M5207.9547,282.5183 L5207.9547,292.5183 L5217.9547,292.5183 L5207.9547,282.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="309.0864" x="4826.38" y="300.0866">Composition: Combatant owns value objects and</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.7017" x="4826.38" y="315.3972">registries that make up its lifecycle state:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="376.5747" x="4826.38" y="330.7077">HitPoints, CombatStats, Inventory, and StatusEffectRegistry.</text></g><g class="entity" data-qualified-name="GMN275" data-source-line="917" id="ent0276"><path d="M6535.78,2439.5183 L6535.78,2495.4499 L6921.2878,2495.4499 L6921.2878,2449.5183 L6911.2878,2439.5183 L6535.78,2439.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M6911.2878,2439.5183 L6911.2878,2449.5183 L6921.2878,2449.5183 L6911.2878,2439.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.4771" x="6541.78" y="2457.0866">Polymorphism: player choices, enemy turns, items,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="331.1255" x="6541.78" y="2472.3972">and special skills are executed through BattleAction.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="364.5078" x="6541.78" y="2487.7077">New actions can be added without changing BattleEngine.</text></g><g class="entity" data-qualified-name="GMN278" data-source-line="923" id="ent0279"><path d="M7315.76,6002.1783 L7315.76,6042.7994 L7667.2063,6042.7994 L7667.2063,6012.1783 L7657.2063,6002.1783 L7315.76,6002.1783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M7657.2063,6002.1783 L7657.2063,6012.1783 L7667.2063,6012.1783 L7657.2063,6002.1783" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="330.4463" x="7321.76" y="6019.7466">Polymorphism: StatusEffectRegistry applies different</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="262.4883" x="7321.76" y="6035.0572">effects through the StatusEffect interface.</text></g><g class="entity" data-qualified-name="GMN281" data-source-line="928" id="ent0282"><path d="M3687.35,2789.5183 L3687.35,2845.4499 L4076.6791,2845.4499 L4076.6791,2799.5183 L4066.6791,2789.5183 L3687.35,2789.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M4066.6791,2789.5183 L4066.6791,2799.5183 L4076.6791,2799.5183 L4066.6791,2789.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="367.4468" x="3693.35" y="2807.0866">Dependency inversion: BattleEngine coordinates the battle</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="308.7817" x="3693.35" y="2822.3972">through abstractions such as TurnOrderStrategy,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="368.3291" x="3693.35" y="2837.7077">PlayerDecisionProvider, TurnProcessor, and WaveManager.</text></g><g class="entity" data-qualified-name="GMN284" data-source-line="934" id="ent0285"><path d="M157.62,3160.1783 L157.62,3200.7994 L590.64,3200.7994 L590.64,3170.1783 L580.64,3160.1783 L157.62,3160.1783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M580.64,3160.1783 L580.64,3170.1783 L590.64,3170.1783 L580.64,3160.1783" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="412.02" x="163.62" y="3177.7466">Boundary-Control split: GUI and CLI classes handle input/output,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="384.9219" x="163.62" y="3193.0572">while BattleController and BattleEngine coordinate use cases.</text></g><!--reverse link Combatant to PlayerCharacter--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="extension" data-source-line="733" id="lnk114"><path codeLine="733" d="M5285.73,3826.6983 C5470.14,3826.6983 5671.71,3826.6983 5671.71,3826.6983 C5671.71,3826.6983 5671.71,3815.4383 5671.71,3801.0083" fill="none" id="Combatant-backto-PlayerCharacter" style="stroke:#333333;stroke-width:1;"/><polygon fill="none" points="5267.73,3826.6983,5285.73,3832.6983,5285.73,3820.6983,5267.73,3826.6983" style="stroke:#333333;stroke-width:1;"/></g><!--reverse link Combatant to EnemyCombatant--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="extension" data-source-line="734" id="lnk115"><path codeLine="734" d="M5286.07,4019.4883 C5411.63,4019.4883 5546.65,4019.4883 5677.53,4019.4883" fill="none" id="Combatant-backto-EnemyCombatant" style="stroke:#333333;stroke-width:1;"/><polygon fill="none" points="5268.07,4019.4883,5286.07,4025.4883,5286.07,4013.4883,5268.07,4019.4883" style="stroke:#333333;stroke-width:1;"/></g><!--reverse link Combatant to CombatantId--><g class="link" data-entity-1="ent0003" data-entity-2="ent0009" data-link-type="composition" data-source-line="735" id="lnk116"><path codeLine="735" d="M5280.07,3887.4883 C5478.5,3887.4883 