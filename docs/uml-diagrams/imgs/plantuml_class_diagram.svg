8" y="7804.7676">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="354.2725" x="8885.5308" y="7821.2559">To keep the generated image readable, local helper,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="397.1748" x="8885.5308" y="7837.7441">enum/value-object, and method-parameter-only uses are</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="344.1826" x="8885.5308" y="7854.2324">shown through signatures instead of extra arrows.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4297" x="8885.5308" y="7870.7207">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="174.5762" x="8885.5308" y="7887.209">OO principle annotations:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="185.917" x="8885.5308" y="7903.6973">Encapsulation - Combatant</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="333.8877" x="8885.5308" y="7920.1855">Inheritance - PlayerCharacter / EnemyCombatant</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="359.9873" x="8885.5308" y="7936.6738">Composition - Combatant owns HitPoints, Inventory,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="259.041" x="8885.5308" y="7953.1621">CombatStats, and StatusEffectRegistry</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="353.5684" x="8885.5308" y="7969.6504">Polymorphism / OCP - BattleAction and StatusEffect</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="393.7363" x="8885.5308" y="7986.1387">Dependency inversion - BattleEngine depends on strategy</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="351.2373" x="8885.5308" y="8002.627">interfaces such as TurnProcessor and WaveManager</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="363.9863" x="8885.5308" y="8019.1152">Observer - BattleEventPublisher + BattleEventListener</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="349.8838" x="8885.5308" y="8035.6035">Factory - BattleSetupFactory and CombatantFactory</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="433.1592" x="8885.5308" y="8052.0918">SRP - ArenaScenePanel, ArenaSceneModel, ArenaSceneRenderer</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="362.5371" x="8885.5308" y="8068.5801">Boundary-Control - UI classes delegate battle flow to</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="224" x="8885.5308" y="8085.0684">BattleController and BattleEngine</text></g><?plantuml-src tJrhS-Csaj_rArYp7qwp8plPxDRLbSxbAbcIFThObbQoCycbjgOe4PQuGv5SFkpHPZE__Rhn8F5eah9daaes-J0oq00QtOr6ez5e5c4HCMyr_kRhhx_nxieiFhdmSnPuusI_zWjlbB7OzqwyQ__0CYoE_3pt9g6_pVnzhnUnXy8h4YyBjxl22yACROemYNlvXp1EVG3nDjXWL1HPk2uBDjiayIhy5_E-ra1IV_F1tx9LSG1Ci0S_taPC0uZ2c1M7b7b9LkoItYuCcBS9imq0sIDvF_Kyxm8wt6P96GVZ94goipCM5s5nE3_t_Z3zdyk_J4SK361MP4d4WKQNNrzUKa1h_ErdlAlBoyk_JFwRWigBp2_OLa3z6OOa-thmDqKYk_eQ_oSnVmJSESXaEfwE4IJ90fRnQkyFV-R_GUaeov8di_1dPC-MnO7W3W1T9fio7mf2iTppeIgC2vO19l0dZfi2YzS7Bq9k3w75_Gp64rFsJiwzQRm5Le1iS59XoIJP-s4C5KZWKsWnYpTH6M3lKUIbMHAKN2BKe0Fl0pjulfA7_Aiz0vO6-G2QXl6EPI5mVyC6Nl8KiopVXUc0uxdt_m5JyxFDBYn0GihCZr0iFkIdFMXvXy8H-MiMvOZrsLarhVFpWOVyB_SCU0A8O05sU7O6aWQaF3_7aGEKa8U35oVnIGuOm8G3AL3hv2FCXdrCet03QuLFSX7Xf2jHXSbc8959lCbOmTHKEMRtDzVGQS67vgZz--H4doWlEZsj-U25-pHYUy27ju7wFqABJR9FappabFpA0_bAucrD8W1A0CZVRZEszING9eaY