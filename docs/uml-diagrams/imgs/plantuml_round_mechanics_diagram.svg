 processing</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="432.7896" x="473" y="212.1201">as SkippedTurnEvent(ELIMINATED). This is why their lifeline can continue.</text><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="1392.6128" x="0" y="246.1523"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1392.6128" y1="246.1523" y2="246.1523"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="1392.6128" y1="249.1523" y2="249.1523"/><rect fill="#EEEEEE" height="24.3516" style="stroke:#000000;stroke-width:2;" width="71.7637" x="660.4246" y="234.9766"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="54.1519" x="666.4246" y="252.4717">Round N</text><g class="message" data-entity-1="part1" data-entity-2="part2" id="msg1"><polygon fill="#181818" points="495.7778,287.6797,505.7778,291.6797,495.7778,295.6797,499.7778,291.6797" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="204.4272" x2="501.7778" y1="291.6797" y2="291.6797"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="7.23" x="211.4272" y="286.8232">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="273.1206" x="222.6572" y="286.8232">determineOrder(combatantsAliveAtRoundStart)</text></g><g class="message" data-entity-1="part2" data-entity-2="part1" id="msg2"><polygon fill="#181818" points="215.4272,318.0313,205.4272,322.0313,215.4272,326.0313,211.4272,322.0313" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="209.4272" x2="511.7778" y1="322.0313" y2="322.0313"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="7.23" x="221.4272" y="317.1748">2</text><text fill="#000000" font-family=